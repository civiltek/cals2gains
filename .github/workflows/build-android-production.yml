name: Build Android Production AAB

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual build'
        required: false
        default: 'Manual production build'

jobs:
  build:
    name: Build Android AAB (local, no EAS cloud quota)
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Setup EAS CLI
        run: npm install -g eas-cli

      - name: Build Android AAB (local - no cloud quota)
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          eas build \
            --platform android \
            --profile production \
            --local \
            --non-interactive \
            --output ./build-output/app-release.aab

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-production-aab
          path: ./build-output/app-release.aab
          retention-days: 30
          if-no-files-found: error
