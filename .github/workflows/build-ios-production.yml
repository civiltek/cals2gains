name: Build iOS Production IPA

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual build'
        required: false
        default: 'Manual production build'

jobs:
  build:
    name: Build and Submit iOS IPA (local, no EAS cloud quota)
    # Apple requires iOS 26 SDK (Xcode 26) starting 2026-04-28.
    # macos-latest currently resolves to macos-15 (Xcode 16 / iOS 18.5 SDK)
    # which produces warning 90725. macos-26 ships with Xcode 26.
    runs-on: macos-26
    timeout-minutes: 90

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Setup EAS CLI
        run: npm install -g eas-cli

      # NOTE: intentionally NOT running `expo prebuild --clean` explicitly.
      # On a fresh CI runner there's no existing ios/ to clean, and EAS
      # `--local` already runs prebuild internally with the correct
      # post-install hooks for RN 0.81 / folly headers. Adding a separate
      # prebuild step caused `folly/memory/MemoryResource.h` not found in
      # ReactCodegen (Xcode 26 archive failure, run 24589008309).

      - name: Build iOS IPA (local - no cloud quota)
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          eas build \
            --platform ios \
            --profile production \
            --local \
            --non-interactive \
            --output ./build-output/app-release.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-production-ipa
          path: ./build-output/app-release.ipa
          retention-days: 30
          if-no-files-found: error

      - name: Submit to App Store Connect
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          eas submit \
            --platform ios \
            --path ./build-output/app-release.ipa \
            --profile production \
            --non-interactive
